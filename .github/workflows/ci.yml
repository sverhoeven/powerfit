name: ci

on: push

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ocl-icd-opencl-dev ocl-icd-libopencl1

      - name: install python deps from pypi
        run: pip install -e .[dev,pocl]

      - name: OpenCL platform and device test
        run: python -c 'import pyopencl as cl;from pyvkfft.fft import rfftn; ps=cl.get_platforms();print(ps);print(ps[0].get_devices())'

      - name: test
        run: >-
          pytest --cov=src --cov-report xml:coverage.xml -vvv

      - uses: codacy/codacy-coverage-reporter-action@v1
        if: >-
          ${{ github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: ./coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: install python deps from pypi
        run: pip install -e .[dev]
      - name: Check style against standards using ruff
        run: |
          ruff check
          ruff format --check
      - name: Check cython code
        run: cython-lint src/powerfit_em/_powerfit.pyx
      - name: Install clang tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy
      - name: Check C code formatting
        run: |
          clang-format -i src/powerfit_em/_extensions.c --dry-run --Werror
      - name: Check C code tidiness
        run: |
          clang-tidy src/powerfit_em/_extensions.c -- \
            -I"$(python -c 'from sysconfig import get_paths; print(get_paths()["include"])')" \
            -I"$(python -c 'import numpy; print(numpy.get_include())')"
